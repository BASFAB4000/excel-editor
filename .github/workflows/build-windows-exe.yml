jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller

      - name: Install UPX
        shell: pwsh
        run: |
          choco install upx -y

      - name: Build
        shell: pwsh
        run: |
          python -m PyInstaller excel_editor.spec --clean --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: excel-editor-windows-exe
          path: dist/excel-editor.exe