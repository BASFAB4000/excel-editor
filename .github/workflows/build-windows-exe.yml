name: Install dependencies
shell: pwsh
run: |
  python -m pip install --upgrade pip
  pip install -r requirements.txt
  pip install -e .
  pip install pyinstaller

name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # stellt sicher, dass das src-layout sauber als Package installiert ist
          pip install -e .

      # OPTION A: UPX installieren (nur nötig wenn upx=True in der spec bleiben soll)
      - name: Install UPX (optional)
        shell: pwsh
        run: |
          choco install upx -y
        continue-on-error: true

      - name: Build EXE (spec)
        shell: pwsh
        run: |
          pyinstaller excel_editor.spec --clean --noconfirm

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: excel-editor-windows-exe
          path: dist/excel-editor.exe
          if-no-files-found: error

