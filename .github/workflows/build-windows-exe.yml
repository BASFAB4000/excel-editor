name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      # UPX ist optional; wenn du upx=True in der spec hast, ist das sinnvoll.
      - name: Install UPX (optional)
        shell: pwsh
        run: |
          choco install upx -y
        continue-on-error: true

      - name: Build EXE (spec)
        shell: pwsh
        run: |
          python -m PyInstaller excel_editor.spec --clean --noconfirm

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: excel-editor-windows-exe
          path: dist/excel-editor.exe
          if-no-files-found: error